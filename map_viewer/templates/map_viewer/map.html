<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Sumber Gempa Indonesia</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --text: #f8fafc;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Labels Style */
        .line-label {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-weight: bold;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            text-shadow: 0 0 3px black;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            pointer-events: none;
        }

        .header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.025em;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .legend {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.875rem;
        }

        .legend-color {
            width: 24px;
            height: 4px;
            margin-right: 12px;
            border-radius: 2px;
        }

        .color-sesar { background-color: #ef4444; }
        .color-subduksi { background-color: #3b82f6; }

        /* Custom Popup Style */
        .leaflet-popup-content-wrapper {
            background: var(--bg);
            color: var(--text);
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
        }
        .leaflet-popup-content {
            margin: 0;
            width: 300px !important;
        }
        .popup-header {
            background: #1e293b;
            padding: 12px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #60a5fa;
        }
        .popup-body {
            padding: 12px;
        }
        .popup-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .popup-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .popup-value {
            font-size: 0.8rem;
            font-weight: 600;
            text-align: right;
            padding-left: 10px;
        }

        /* Coordinates Display */
        .mouse-coords {
            position: absolute;
            bottom: 0;
            right: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 2px 10px;
            pointer-events: none;
            border-top-left-radius: 4px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Context Menu Style */
        .context-menu {
            position: absolute;
            z-index: 2000;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            padding: 4px 0;
            min-width: 180px;
            display: none;
        }
        .context-menu-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }
        .context-menu-item:hover {
            background: #334155;
            color: #60a5fa;
        }
        .context-menu-label {
            font-size: 11px;
            color: #94a3b8;
            padding: 4px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Control Layers */
        .leaflet-control-layers {
            background: var(--card-bg) !important;
            color: var(--text) !important;
            border-radius: 8px !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        /* Toast notification */
        .toast {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        /* Loader */
        #loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="header">
        <h1>Peta Sumber Gempa Indonesia 2024</h1>
    </div>

    <div id="map"></div>

    <div id="mouse-coords" class="mouse-coords">
        Lat: 0.00000 | Lng: 0.00000
    </div>

    <div id="context-menu" class="context-menu">
        <div id="context-coords-label" class="context-menu-label">0.00, 0.00</div>
        <div class="context-menu-item" onclick="copyCoords()">
            <span>📋</span> Salin koordinat
        </div>
    </div>

    <div id="toast" class="toast">Koordinat berhasil disalin!</div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color color-sesar"></div>
            <span>Sesar aktif (Active Fault)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color color-subduksi"></div>
            <span>Subduksi (Subduction Trench)</span>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Global variables for features
        let currentCoords = null;
        const coordsEl = document.getElementById('mouse-coords');
        const ctxMenu = document.getElementById('context-menu');
        const ctxLabel = document.getElementById('context-coords-label');
        const toast = document.getElementById('toast');

        // Basemaps
        const googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            attribution: '&copy; Google Maps',
            maxZoom: 20
        });

        const esriImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
        });

        const darkMatter = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        });

        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        });

        // Initialize Map
        const map = L.map('map', {
            center: [-2.5, 118],
            zoom: 5,
            layers: [googleSat],
            contextmenu: true, // Marker for our logic
            attributionControl: true
        });

        const baseMaps = {
            "Google Satellite": googleSat,
            "ESRI World Imagery": esriImagery,
            "CartoDB Dark": darkMatter,
            "OpenStreetMap": osm
        };

        const overlayMaps = {};
        const layerControl = L.control.layers(baseMaps, overlayMaps).addTo(map);

        // --- Feature: Mouse Position ---
        map.on('mousemove', (e) => {
            const { lat, lng } = e.latlng;
            coordsEl.innerHTML = `Lat: ${lat.toFixed(5)} | Lng: ${lng.toFixed(5)}`;
        });

        // --- Feature: Context Menu (Right Click) ---
        map.on('contextmenu', (e) => {
            currentCoords = e.latlng;
            const { lat, lng } = currentCoords;
            const roundedLat = lat.toFixed(6);
            const roundedLng = lng.toFixed(6);
            
            ctxLabel.innerText = `${roundedLat}, ${roundedLng}`;
            
            ctxMenu.style.display = 'block';
            ctxMenu.style.left = `${e.containerPoint.x}px`;
            ctxMenu.style.top = `${e.containerPoint.y}px`;
        });

        // Hide context menu on map click or move
        map.on('click dragstart zoomstart', () => {
            ctxMenu.style.display = 'none';
        });

        // Function to copy coordinates
        window.copyCoords = function() {
            if (!currentCoords) return;
            const text = `${currentCoords.lat.toFixed(6)}, ${currentCoords.lng.toFixed(6)}`;
            
            // Standard Clipboard API (requires HTTPS or localhost)
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    ctxMenu.style.display = 'none';
                    showToast();
                }).catch(err => {
                    console.error('Clipboard API error:', err);
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        };

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    ctxMenu.style.display = 'none';
                    showToast();
                } else {
                    console.error('Fallback copy was unsuccessful');
                }
            } catch (err) {
                console.error('Fallback copy failed:', err);
            }
            document.body.removeChild(textArea);
        }

        function showToast() {
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        // --- Styling functions ---
        const sesarStyle = { color: "#ef4444", weight: 3, opacity: 0.8 };
        const subduksiStyle = { color: "#3b82f6", weight: 4, opacity: 0.9 };

        function formatVal(val) {
            if (val === null || val === undefined || val === '') return '-';
            if (typeof val === 'number') return val.toLocaleString();
            return val;
        }

        function createPopup(feature) {
            const p = feature.properties;
            let rows = '';
            
            const fields = p.trenchname ? 
                [['Trench Name', p.trenchname], ['Remarks', p.remarks]] :
                [['Name', p.name], ['Segment', p.segment], ['Region', p.region], ['Type', p.type], ['Sliprate (m)', p.sliprate_m], ['Length (km)', p.length_km], ['Mmax', p.mmax]];

            fields.forEach(([label, val]) => {
                if (val !== undefined) {
                    rows += `
                    <div class="popup-row">
                        <span class="popup-label">${label}</span>
                        <span class="popup-value">${formatVal(val)}</span>
                    </div>`;
                }
            });

            return `
                <div class="popup-header">${p.display_name}</div>
                <div class="popup-body">${rows}</div>
            `;
        }

        function onEachFeature(feature, layer) {
            // Permanent Label
            layer.bindTooltip(feature.properties.display_name, {
                permanent: true,
                direction: 'center',
                className: 'line-label'
            });

            layer.bindPopup(createPopup(feature));
            
            layer.on({
                mouseover: function(e) {
                    const l = e.target;
                    l.setStyle({ weight: 6, opacity: 1 });
                },
                mouseout: function(e) {
                    const l = e.target;
                    l.setStyle({ weight: l.defaultWeight, opacity: l.defaultOpacity });
                }
            });
        }

        // Fetch Data
        async function loadData() {
            try {
                const [sesarRes, subduksiRes] = await Promise.all([
                    fetch('/data/sesar/'),
                    fetch('/data/subduksi/')
                ]);

                const sesarData = await sesarRes.json();
                const subduksiData = await subduksiRes.json();

                if (sesarData.features) {
                    const layer = L.geoJSON(sesarData, {
                        style: sesarStyle,
                        onEachFeature: function(f, l) {
                            l.defaultWeight = 3;
                            l.defaultOpacity = 0.8;
                            onEachFeature(f, l);
                        }
                    }).addTo(map);
                    layerControl.addOverlay(layer, "Sesar Aktif");
                }

                if (subduksiData.features) {
                    const layer = L.geoJSON(subduksiData, {
                        style: subduksiStyle,
                        onEachFeature: function(f, l) {
                            l.defaultWeight = 4;
                            l.defaultOpacity = 0.9;
                            onEachFeature(f, l);
                        }
                    }).addTo(map);
                    layerControl.addOverlay(layer, "Subduksi");
                }

                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                }, 500);

            } catch (err) {
                console.error("Error loading map data:", err);
                alert("Gagal memuat data peta.");
            }
        }

        loadData();
    </script>
</body>
</html>
